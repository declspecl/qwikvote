services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    # In-memory avoids sqlite file/volume permission issues in dev.
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8001:8000"

  dynamodb-local-init:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        set -euo pipefail;
        echo "Waiting for DynamoDB Local...";
        for i in $(seq 1 60); do
          if aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1; then
            break;
          fi;
          sleep 1;
        done;
        echo "Ensuring table exists...";
        aws dynamodb describe-table --table-name qwikvote-polls --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1
        || aws dynamodb create-table \
          --table-name qwikvote-polls \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 >/dev/null;
        echo "Done.";
    restart: "no"
