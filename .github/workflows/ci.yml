name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "qwikvote-api/**"
      - "qwikvote-cdk/**"
      - "qwikvote-website/**"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "qwikvote-api/**"
      - "qwikvote-cdk/**"
      - "qwikvote-website/**"
      - "README.md"

permissions:
  contents: read

jobs:
  website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qwikvote-website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: qwikvote-website/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_BASE_URL: https://example.execute-api.us-east-1.amazonaws.com/v1

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qwikvote-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: qwikvote-api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall main.py poll suggestion randomness
      - run: python -c "from main import app; print(app.title)"

  infrastructure:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qwikvote-cdk
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: qwikvote-cdk/pnpm-lock.yaml
      - name: Build website asset for CDK synth
        working-directory: qwikvote-website
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: https://example.execute-api.us-east-1.amazonaws.com/v1
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec cdk synth
        env:
          AWS_ACCOUNT_ID: "000000000000"
          AWS_REGION: us-east-1
          RANDOM_ORG_API_KEY: ci-placeholder
