name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "qwikvote-api/**"
      - "qwikvote-cdk/**"
      - "qwikvote-website/**"
      - "README.md"

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
  API_STACK_NAME: qwikvote-alpha
  WEBSITE_STACK_NAME: qwikvote-website-alpha

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: qwikvote-cdk/pnpm-lock.yaml
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install website dependencies
        working-directory: qwikvote-website
        run: npm ci
      - name: Build website placeholder asset
        working-directory: qwikvote-website
        run: npm run build
        env:
          VITE_API_BASE_URL: https://example.execute-api.us-east-1.amazonaws.com/v1
      - name: Install CDK dependencies
        working-directory: qwikvote-cdk
        run: pnpm install --frozen-lockfile
      - name: Deploy API stack
        working-directory: qwikvote-cdk
        run: pnpm exec cdk deploy "$API_STACK_NAME" --require-approval never --outputs-file cdk-outputs.json
        env:
          RANDOM_ORG_API_KEY: ${{ secrets.RANDOM_ORG_API_KEY }}
      - name: Read API URL
        id: api
        working-directory: qwikvote-cdk
        run: |
          api_url="$(jq -r --arg stack "$API_STACK_NAME" '.[$stack].ApiUrl' cdk-outputs.json)"
          if [ -z "$api_url" ] || [ "$api_url" = "null" ]; then
            echo "API URL was not found in cdk-outputs.json" >&2
            exit 1
          fi
          echo "api_url=$api_url" >> "$GITHUB_OUTPUT"
      - name: Rebuild website with deployed API URL
        working-directory: qwikvote-website
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ steps.api.outputs.api_url }}
      - name: Deploy website stack
        working-directory: qwikvote-cdk
        run: pnpm exec cdk deploy "$WEBSITE_STACK_NAME" --require-approval never --outputs-file cdk-outputs.json
        env:
          RANDOM_ORG_API_KEY: ${{ secrets.RANDOM_ORG_API_KEY }}
      - name: Publish deployment summary
        working-directory: qwikvote-cdk
        run: |
          website_url="$(jq -r --arg stack "$WEBSITE_STACK_NAME" '.[$stack].WebsiteUrl' cdk-outputs.json)"
          {
            echo "### Deployment complete"
            echo
            echo "- API: ${{ steps.api.outputs.api_url }}"
            echo "- Website: $website_url"
          } >> "$GITHUB_STEP_SUMMARY"
